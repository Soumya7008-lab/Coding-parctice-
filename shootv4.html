<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ STARGLIDE – Gesture Space Shooter</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-primary: #fff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glow: 0 0 18px rgba(255, 255, 255, 0.4);
            --accent: #00e0ff;
            --danger: #ff4b6e;
            --ammo-color: #ffe484;
            --score-color: #ffd700;
            --boost-color: #ff6b00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0f0f19;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* Modern Frosted Glass UI */
        .ui-topbar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            gap: 15px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 12px 22px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .lives-panel .life-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff4b6e;
            box-shadow: 0 0 12px #ff4b6e;
            transition: transform 0.2s, background 0.3s;
            display: inline-block;
            margin: 0 3px;
        }
        .lives-panel .life-dot.lost {
            background: #4a4a5a;
            box-shadow: none;
        }

        .score-value {
            font-weight: 700;
            font-size: 26px;
            color: var(--score-color);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .distance-panel {
            font-size: 18px;
            min-width: 140px;
            justify-content: center;
        }
        .distance-value {
            font-weight: 700;
            font-size: 26px;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ammo-panel { gap: 8px; }
        .bullet-icons { display: flex; gap: 6px; }
        .bullet-icon {
            width: 8px;
            height: 18px;
            background: var(--ammo-color);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--ammo-color);
            transition: opacity 0.2s;
            opacity: 1;
        }
        .bullet-icon.empty { opacity: 0.2; box-shadow: none; }
        
        .reload-bar-bg {
            width: 90px;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            overflow: hidden;
        }
        .reload-bar-fill {
            height: 100%; width: 0%;
            background: var(--ammo-color);
            border-radius: 10px;
            transition: width 0.1s linear;
        }
        .reload-bar-fill.boosted {
            background: var(--boost-color);
            box-shadow: 0 0 10px var(--boost-color);
        }

        /* Instructions Corner */
        .instructions-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 15px 20px;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .instructions-panel span { display: flex; align-items: center; gap: 8px; }
        .instructions-panel kbd {
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }

        .gesture-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            transition: opacity 0.3s;
        }
        .gesture-state {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            transition: 0.2s;
        }
        .gesture-state.active { background: #00e676; box-shadow: 0 0 14px #00e676; }
        .gesture-state.fist { background: #ff3d00; box-shadow: 0 0 16px #ff3d00; }

        #webcamPreview {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 130px;
            height: 95px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.7;
            z-index: 3;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
        }

        /* Overlays (Loading, Menu, Pause) */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(15,15,30,0.8), rgba(5,5,10,0.95));
            backdrop-filter: blur(12px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        #loadingOverlay { z-index: 20; background: #0a0a0a; }
        .loader-spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0, 224, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .loader-text {
            color: var(--accent); font-weight: bold; letter-spacing: 4px;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; text-shadow: 0 0 10px var(--accent); } }

        /* Main Menu Styling */
        .menu-title {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 12px;
            color: #fff;
            text-shadow: 0 0 40px rgba(0, 224, 255, 0.6), 0 0 10px rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #pauseText {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 30px var(--accent);
            margin-bottom: 30px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin: 10px;
            letter-spacing: 3px;
            backdrop-filter: blur(12px);
            transition: all 0.2s;
            pointer-events: all;
            min-width: 280px;
        }
        .menu-btn:hover {
            background: rgba(0, 224, 255, 0.2);
            border-color: var(--accent);
            box-shadow: 0 0 24px rgba(0, 224, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <video id="webcamPreview" autoplay playsinline></video>

    <div class="ui-topbar">
        <div class="glass-panel lives-panel" id="livesPanel">
            </div>
        
        <div class="glass-panel score-panel">
            <span style="color: #ffd700; font-size: 22px;">★</span>
            <span class="score-value" id="scoreValue">0</span>
        </div>

        <div class="glass-panel distance-panel">
            <span class="distance-value" id="distanceValue">0</span>
            <span class="distance-unit">km</span>
        </div>
        
        <div class="glass-panel ammo-panel">
            <div class="bullet-icons" id="bulletIcons">
                <span class="bullet-icon"></span><span class="bullet-icon"></span>
                <span class="bullet-icon"></span><span class="bullet-icon"></span>
                <span class="bullet-icon"></span><span class="bullet-icon"></span>
                <span class="bullet-icon"></span><span class="bullet-icon"></span>
                <span class="bullet-icon"></span><span class="bullet-icon"></span>
            </div>
            <div class="reload-bar-bg">
                <div class="reload-bar-fill" id="reloadFill"></div>
            </div>
        </div>
    </div>

    <div class="glass-panel instructions-panel">
        <span><kbd>SPACE</kbd> Pause / Menu</span>
        <span><kbd>✋</kbd> or <kbd>🖱️</kbd> Steer Ship</span>
        <span><kbd>✊</kbd> or <kbd>L-Click</kbd> Fire Lasers</span>
    </div>

    <div class="gesture-panel" id="gesturePanel">
        <div class="gesture-state" id="gestureDot"></div>
        <span id="gestureText">SCANNING...</span>
    </div>

    <div id="loadingOverlay" class="overlay">
        <div class="loader-spinner"></div>
        <div class="loader-text">ESTABLISHING NEURAL LINK...</div>
        <p style="color: #666; margin-top: 15px; font-size: 14px;">Downloading Tracking Model</p>
    </div>

    <div id="menuOverlay" class="overlay hidden">
        <div class="menu-title">✦ STARGLIDE</div>
        <button class="menu-btn" id="startBtn">IGNITE ENGINES</button>
        <button class="menu-btn" id="toggleControlBtnMenu">INPUT: GESTURE</button>
        <button class="menu-btn" id="howBtn">CONTROLS GUIDE</button>
    </div>

    <div id="pauseOverlay" class="overlay hidden">
        <div id="pauseText">PAUSED</div>
        <button class="menu-btn" id="resumeBtn">RESUME FLIGHT</button>
        <button class="menu-btn" id="toggleControlBtnPause">INPUT: GESTURE</button>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const video = document.getElementById('webcamPreview');
            
            const distanceSpan = document.getElementById('distanceValue');
            const scoreSpan = document.getElementById('scoreValue');
            const bulletIconsContainer = document.getElementById('bulletIcons');
            const reloadFill = document.getElementById('reloadFill');
            const gestureDot = document.getElementById('gestureDot');
            const gestureText = document.getElementById('gestureText');
            const livesPanel = document.getElementById('livesPanel');
            const gesturePanel = document.getElementById('gesturePanel');

            const loadingOverlay = document.getElementById('loadingOverlay');
            const menuOverlay = document.getElementById('menuOverlay');
            const pauseOverlay = document.getElementById('pauseOverlay');
            const pauseText = document.getElementById('pauseText');

            // Game dimensions
            let W, H;
            function resize() { 
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight; 
            }
            window.addEventListener('resize', resize);
            resize();

            // Game State & Modes
            let gameActive = false;
            let isPaused = false;
            let isResuming = false;
            let controlMode = 'gesture'; // 'gesture' or 'mouse'
            
            let score = 0;
            let distanceTraveled = 0;
            let lives = 3;
            const MAX_LIVES = 5;
            let shipX, shipY;
            
            let lasers = [];
            let asteroids = [];
            let particles = [];
            let stars = [];
            let items = []; 
            
            let shake = 0;
            
            // Powerup Timers
            let isInvincible = false;
            let invincibilityTimer = 0;
            let boostTimer = 0; 

            // Ammo
            const MAX_AMMO = 10;
            let ammo = MAX_AMMO;
            let reloadProgress = 0;
            const RELOAD_TIME = 0.8; 
            let lastFireTime = 0;
            const FIRE_COOLDOWN = 0.20; 

            // Input tracking
            let handX = 0.5, handY = 0.5;
            let isFiringInput = false; 
            let handDetected = false;
            let webcamReady = false;

            // Audio Setup
            let audioCtx = null;
            function initAudio() { if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)(); }
            function playSound(freq, type, dur, vol = 0.1) {
                if (!audioCtx) return;
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, t);
                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t); osc.stop(t + dur);
            }
            function laserSound() { playSound(900, 'sine', 0.08, 0.06); playSound(1200, 'sine', 0.06, 0.04); }
            function explosionSound() { playSound(45, 'sawtooth', 0.25, 0.1); playSound(70, 'triangle', 0.2, 0.08); }
            function hitSound() { playSound(180, 'square', 0.2, 0.1); }
            function collectSound() { playSound(1200, 'sine', 0.1, 0.05); playSound(1600, 'sine', 0.1, 0.05); }
            function powerupSound() { playSound(600, 'square', 0.3, 0.1); playSound(800, 'triangle', 0.4, 0.1); }
            function healSound() { playSound(400, 'sine', 0.2, 0.1); playSound(600, 'sine', 0.3, 0.1); }

            // Dynamic Gradients
            const gradientPhases = [
                [15, 15, 25],   // Dark Blue
                [10, 40, 20],   // Dark Green
                [40, 15, 50],   // Dark Purple
                [15, 30, 45]    // Deep Ocean
            ];

            function updateBackground() {
                let phase = (distanceTraveled / 1000) % gradientPhases.length;
                let index = Math.floor(phase);
                let nextIndex = (index + 1) % gradientPhases.length;
                let mix = phase % 1;

                let c1 = gradientPhases[index];
                let c2 = gradientPhases[nextIndex];

                let r = Math.round(c1[0] * (1 - mix) + c2[0] * mix);
                let g = Math.round(c1[1] * (1 - mix) + c2[1] * mix);
                let b = Math.round(c1[2] * (1 - mix) + c2[2] * mix);

                document.body.style.background = `radial-gradient(circle at 30% 30%, rgb(${r+20}, ${g+20}, ${b+20}), rgb(${r}, ${g}, ${b}))`;
            }

            function createStars() {
                stars = [];
                for (let i = 0; i < 150; i++) {
                    stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 2.2 + 0.8, speed: Math.random() * 2 + 0.5, alpha: Math.random() * 0.8 + 0.2 });
                }
            }
            createStars();

            function drawSpaceship(x, y) {
                ctx.save();
                ctx.translate(x, y);
                
                // Shield Effect
                if (isInvincible) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 40, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 224, 255, ${0.5 + Math.sin(Date.now() * 0.01) * 0.3})`;
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#00e0ff';
                    ctx.shadowBlur = 20;
                    ctx.stroke();
                }

                ctx.shadowColor = '#00e0ff';
                ctx.shadowBlur = 18;
                ctx.fillStyle = '#f0f5ff';
                ctx.beginPath();
                ctx.moveTo(25, 0); ctx.lineTo(-20, -20); ctx.lineTo(-12, 0); ctx.lineTo(-20, 20);
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#1a1c29';
                ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.ellipse(5, 0, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
                
                // Engine Jet
                ctx.fillStyle = boostTimer > 0 ? '#ff6b00' : '#ff8c42';
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(-26, -8, 6, 16);
                
                ctx.restore();
            }

            function drawLaser(l) {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + 20, l.y - 2); ctx.lineTo(l.x + 22, l.y); ctx.lineTo(l.x + 20, l.y + 2);
                ctx.closePath();
                const grad = ctx.createLinearGradient(l.x, l.y, l.x + 22, l.y);
                grad.addColorStop(0, l.color || '#00e0ff'); 
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.shadowColor = l.color || '#0ff'; ctx.shadowBlur = 12; ctx.fill(); ctx.shadowBlur = 0;
            }

            function drawAsteroid(ast) {
                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.rotation);
                ctx.beginPath();
                if (ast.verts.length > 0) {
                    ctx.moveTo(ast.verts[0].x, ast.verts[0].y);
                    for (let i = 1; i < ast.verts.length; i++) ctx.lineTo(ast.verts[i].x, ast.verts[i].y);
                    ctx.closePath();
                }
                const grad = ctx.createLinearGradient(-ast.size / 2, -ast.size / 2, ast.size / 2, ast.size / 2);
                grad.addColorStop(0, '#5c4a3a'); grad.addColorStop(1, '#2b1e14');
                ctx.fillStyle = grad; ctx.fill();
                ctx.strokeStyle = '#1a120a'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#332217';
                ctx.beginPath(); ctx.arc(-ast.size * 0.2, -ast.size * 0.1, ast.size * 0.12, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            function drawItem(item) {
                ctx.save();
                ctx.translate(item.x, item.y);
                
                if (item.type === 'score') {
                    ctx.rotate(item.rot);
                    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
                    ctx.fillStyle = '#ffea00';
                    ctx.beginPath();
                    ctx.moveTo(0, -item.size); ctx.lineTo(item.size/1.5, 0); ctx.lineTo(0, item.size); ctx.lineTo(-item.size/1.5, 0);
                    ctx.closePath(); ctx.fill();
                } else if (item.type === 'health') {
                    const s = item.size / 15; 
                    const pulse = 1 + Math.sin(Date.now() * 0.005) * 0.1;
                    ctx.scale(s * pulse, s * pulse);
                    ctx.fillStyle = '#ff4b6e'; ctx.shadowColor = '#ff4b6e'; ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.moveTo(0, 4);
                    ctx.bezierCurveTo(-10, -10, -25, 4, 0, 18);
                    ctx.bezierCurveTo(25, 4, 10, -10, 0, 4);
                    ctx.fill();
                } else if (item.type === 'shield') {
                    ctx.shadowColor = '#00e0ff'; ctx.shadowBlur = 15;
                    ctx.fillStyle = '#111'; ctx.strokeStyle = '#00e0ff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, item.size, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#00e0ff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('S', 0, 1);
                } else if (item.type === 'boost') {
                    ctx.shadowColor = '#ff6b00'; ctx.shadowBlur = 15;
                    ctx.fillStyle = '#111'; ctx.strokeStyle = '#ff6b00'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, item.size, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#ff6b00'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('⚡', 0, 1);
                }
                ctx.restore();
            }

            function spawnAsteroid() {
                const size = 28 + Math.random() * 55;
                const y = Math.random() * (H - size) + size / 2;
                const speed = 3.5 + Math.random() * 4;
                const verts = [];
                const num = 9 + Math.floor(Math.random() * 8);
                for (let i = 0; i < num; i++) {
                    const a = (i / num) * Math.PI * 2;
                    const r = size / 2 * (0.65 + Math.random() * 0.55);
                    verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
                }
                asteroids.push({ x: W + size, y, size, speed, verts, rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.05, active: true });
            }

            function createExplosion(x, y, colorCode) {
                for (let i = 0; i < 20; i++) {
                    let color = Math.random() > 0.5 ? '#ffaa33' : '#ff6633'; 
                    if (colorCode === 1) color = '#00e0ff';
                    if (colorCode === 2) color = '#ff4b6e';
                    if (colorCode === 3) color = '#ff6b00';
                    
                    particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 9, vy: (Math.random() - 0.5) * 9,
                        life: 1, decay: 0.015 + Math.random() * 0.04, size: 2 + Math.random() * 5, color: color
                    });
                }
            }

            // Input Handling (Mouse vs Gesture)
            window.addEventListener('mousemove', (e) => {
                if (controlMode === 'mouse' && gameActive && !isPaused) {
                    handX = e.clientX / W;
                    handY = e.clientY / H;
                }
            });
            window.addEventListener('mousedown', () => {
                if (controlMode === 'mouse' && gameActive && !isPaused) isFiringInput = true;
            });
            window.addEventListener('mouseup', () => {
                if (controlMode === 'mouse') isFiringInput = false;
            });

            function updateAmmo(dt) {
                if (ammo < MAX_AMMO) {
                    reloadProgress += dt / RELOAD_TIME;
                    if (reloadProgress >= 1) { ammo++; reloadProgress -= 1; if (ammo >= MAX_AMMO) { ammo = MAX_AMMO; reloadProgress = 0; } }
                } else { reloadProgress = 0; }
                
                const icons = bulletIconsContainer.children;
                for (let i = 0; i < MAX_AMMO; i++) { 
                    if (i < ammo) icons[i].classList.remove('empty'); 
                    else icons[i].classList.add('empty'); 
                }
                reloadFill.style.width = (reloadProgress * 100) + '%';
                
                if (boostTimer > 0) reloadFill.classList.add('boosted');
                else reloadFill.classList.remove('boosted');
            }

            function fireWeapon() {
                const now = performance.now() / 1000;
                const activeCooldown = boostTimer > 0 ? FIRE_COOLDOWN * 0.4 : FIRE_COOLDOWN; 
                
                if (ammo <= 0 || now - lastFireTime < activeCooldown) return;
                
                ammo--; lastFireTime = now; reloadProgress = Math.max(0, reloadProgress);
                
                if (boostTimer > 0) {
                    lasers.push({ x: shipX + 25, y: shipY, speed: 16, dy: 0, color: '#ff6b00' });
                    lasers.push({ x: shipX + 25, y: shipY - 8, speed: 15, dy: -1.5, color: '#ff6b00' });
                    lasers.push({ x: shipX + 25, y: shipY + 8, speed: 15, dy: 1.5, color: '#ff6b00' });
                } else {
                    lasers.push({ x: shipX + 25, y: shipY, speed: 14, dy: 0, color: '#00e0ff' });
                }
                laserSound();
            }

            function updateLivesUI() {
                livesPanel.innerHTML = '';
                for (let i = 0; i < Math.max(lives, MAX_LIVES); i++) {
                    const dot = document.createElement('span');
                    dot.className = 'life-dot';
                    if (i >= lives) dot.classList.add('lost');
                    livesPanel.appendChild(dot);
                }
            }

            function resetGame() {
                gameActive = true; isPaused = false; isResuming = false;
                score = 0; distanceTraveled = 0; lives = 3; ammo = MAX_AMMO; reloadProgress = 0;
                shipX = W * 0.2; shipY = H / 2; 
                lasers = []; asteroids = []; particles = []; items = [];
                shake = 0; isInvincible = false; invincibilityTimer = 0; boostTimer = 0;
                
                updateLivesUI(); updateAmmo(0);
                scoreSpan.textContent = score;
                document.body.style.cursor = 'none';
            }

            function gameOver() {
                gameActive = false;
                document.body.style.cursor = 'default';
                playSound(70, 'sawtooth', 0.5, 0.12);
                setTimeout(() => { menuOverlay.classList.remove('hidden'); document.querySelector('.menu-title').textContent = 'FLIGHT FAILED'; }, 1000);
            }

            // Pause System
            function togglePause() {
                if (!gameActive || isResuming) return;
                if (!isPaused) {
                    isPaused = true;
                    pauseOverlay.classList.remove('hidden');
                    pauseText.textContent = 'PAUSED';
                    document.body.style.cursor = 'default';
                } else {
                    startResumeCountdown();
                }
            }

            function startResumeCountdown() {
                isResuming = true;
                let count = 3;
                pauseText.textContent = count;
                let cInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        pauseText.textContent = count;
                    } else {
                        clearInterval(cInterval);
                        isPaused = false;
                        isResuming = false;
                        pauseOverlay.classList.add('hidden');
                        document.body.style.cursor = 'none';
                        gameLoop.lastTs = performance.now(); 
                    }
                }, 1000);
            }

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (gameActive) togglePause();
                }
            });

            document.getElementById('resumeBtn').addEventListener('click', startResumeCountdown);

            // Control Switching Buttons
            function switchControl(mode) {
                controlMode = mode;
                const txt = mode === 'gesture' ? 'INPUT: GESTURE' : 'INPUT: MOUSE';
                document.getElementById('toggleControlBtnMenu').textContent = txt;
                document.getElementById('toggleControlBtnPause').textContent = txt;
                
                video.style.opacity = mode === 'gesture' ? '0.7' : '0.1'; 
                gesturePanel.style.opacity = mode === 'gesture' ? '1' : '0.3';
            }

            document.getElementById('toggleControlBtnMenu').addEventListener('click', () => {
                switchControl(controlMode === 'gesture' ? 'mouse' : 'gesture');
            });
            document.getElementById('toggleControlBtnPause').addEventListener('click', () => {
                switchControl(controlMode === 'gesture' ? 'mouse' : 'gesture');
            });
            document.getElementById('howBtn').addEventListener('click', () => {
                alert('✦ STARGLIDE CONTROLS ✦\n\n✋ OPEN HAND / MOUSE: Steer ship\n✊ FIST / L-CLICK: Fire lasers\n⏸️ SPACEBAR: Pause Game\n\n✨ POWERUPS:\nGold Diamond: +100 Points\nRed Heart: +1 Life\nBlue Orb: 10s Invincibility\nOrange Orb: 10s Overcharge Lasers');
            });

            // Main Game Update
            function update(dt) {
                let targetX = W * 0.15; let targetY = H / 2;
                if (controlMode === 'mouse') {
                    targetX = handX * W; targetY = handY * H;
                } else if (handDetected) {
                    targetX = W * 0.15 + handX * (W * 0.3); targetY = handY * H;
                }
                
                shipX += (targetX - shipX) * 0.15; shipY += (targetY - shipY) * 0.15;
                shipX = Math.max(40, Math.min(W * 0.45, shipX)); shipY = Math.max(40, Math.min(H - 40, shipY));

                if (isFiringInput && ammo > 0) fireWeapon();
                
                if (Math.random() < 0.025 && asteroids.length < 15) spawnAsteroid();
                
                // Fine-tuned Item Spawn Rates
                const r = Math.random();
                if (r < 0.010) items.push({ type: 'score', x: W + 30, y: Math.random() * (H-60)+30, size: 14, speed: 5, rot: 0 });
                else if (r < 0.012) items.push({ type: 'shield', x: W + 30, y: Math.random() * (H-60)+30, size: 16, speed: 6, rot: 0 });
                else if (r < 0.014) items.push({ type: 'health', x: W + 30, y: Math.random() * (H-60)+30, size: 18, speed: 4, rot: 0 });
                else if (r < 0.016) items.push({ type: 'boost', x: W + 30, y: Math.random() * (H-60)+30, size: 16, speed: 6, rot: 0 });

                for (let a of asteroids) a.x -= a.speed;
                asteroids = asteroids.filter(a => a.x > -80);

                for (let l of lasers) { l.x += l.speed; l.y += l.dy; }
                lasers = lasers.filter(l => l.x < W + 40 && l.y > -20 && l.y < H + 20);

                for (let i of items) { i.x -= i.speed; i.rot += 0.05; }
                items = items.filter(i => i.x > -30);

                // Laser hit Asteroids
                for (let i = lasers.length - 1; i >= 0; i--) {
                    for (let j = asteroids.length - 1; j >= 0; j--) {
                        const l = lasers[i], a = asteroids[j];
                        if (Math.sqrt((l.x - a.x)**2 + (l.y - a.y)**2) < a.size / 2 + 8) {
                            lasers.splice(i, 1); asteroids.splice(j, 1); 
                            score += 10;
                            createExplosion(a.x, a.y); explosionSound(); shake = 4; break;
                        }
                    }
                }

                // Ship hit Asteroids
                for (let i = asteroids.length - 1; i >= 0; i--) {
                    const a = asteroids[i];
                    if (Math.sqrt((shipX - a.x)**2 + (shipY - a.y)**2) < a.size / 2 + 18) {
                        asteroids.splice(i, 1);
                        if (isInvincible) {
                            score += 50; createExplosion(a.x, a.y, 1); explosionSound(); shake = 4;
                        } else {
                            lives--; updateLivesUI(); hitSound(); shake = 18;
                            createExplosion(shipX, shipY, 0);
                            if (lives <= 0) { gameOver(); return; }
                        }
                    }
                }

                // Collect Items
                for (let i = items.length - 1; i >= 0; i--) {
                    const item = items[i];
                    if (Math.sqrt((shipX - item.x)**2 + (shipY - item.y)**2) < item.size + 25) {
                        if (item.type === 'score') { score += 100; collectSound(); }
                        if (item.type === 'shield') { isInvincible = true; invincibilityTimer = 10.0; powerupSound(); createExplosion(shipX, shipY, 1); }
                        if (item.type === 'boost') { boostTimer = 10.0; ammo = MAX_AMMO; powerupSound(); createExplosion(shipX, shipY, 3); }
                        if (item.type === 'health') { lives = Math.min(lives + 1, MAX_LIVES); updateLivesUI(); healSound(); createExplosion(shipX, shipY, 2); }
                        items.splice(i, 1);
                    }
                }

                if (invincibilityTimer > 0) {
                    invincibilityTimer -= dt;
                    if (invincibilityTimer <= 0) { isInvincible = false; }
                }
                if (boostTimer > 0) { boostTimer -= dt; }

                for (let p of particles) { p.x += p.vx; p.y += p.vy; p.life -= p.decay; }
                particles = particles.filter(p => p.life > 0);
                if (shake > 0) shake *= 0.9;

                distanceTraveled += dt * 30; 
                distanceSpan.textContent = Math.floor(distanceTraveled);
                scoreSpan.textContent = score;

                updateBackground();
                updateAmmo(dt);
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                let sx = 0, sy = 0;
                if (shake > 0.3) { sx = (Math.random() - 0.5) * shake; sy = (Math.random() - 0.5) * shake; }
                
                ctx.save(); ctx.translate(sx, sy);

                for (let s of stars) { 
                    if (gameActive && !isPaused) s.x -= s.speed; 
                    if (s.x < -5) s.x = W + 5;
                    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); 
                }

                for (let i of items) drawItem(i);
                for (let a of asteroids) drawAsteroid(a);
                for (let l of lasers) drawLaser(l);
                
                if (gameActive || lives > 0) drawSpaceship(shipX, shipY);
                
                for (let p of particles) { 
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); 
                }
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            function gameLoop(ts) {
                const dt = Math.min(0.05, (ts - (gameLoop.lastTs || ts)) / 1000);
                gameLoop.lastTs = ts;
                
                if (gameActive && !isPaused && !isResuming) {
                    update(dt);
                    document.body.style.cursor = 'none'; // Keep cursor hidden while playing
                }

                draw(); 

                if (controlMode === 'mouse') {
                    gestureDot.classList.add('active');
                    gestureDot.classList.toggle('fist', isFiringInput);
                    gestureText.textContent = isFiringInput ? 'MOUSE: FIRE' : 'MOUSE: FLY';
                } else {
                    if (handDetected) {
                        gestureDot.classList.add('active');
                        gestureDot.classList.toggle('fist', isFiringInput);
                        gestureText.textContent = isFiringInput ? 'FIST: FIRING' : 'OPEN: FLYING';
                    } else {
                        gestureDot.classList.remove('active', 'fist');
                        gestureText.textContent = 'NO HAND DETECTED';
                    }
                }
                requestAnimationFrame(gameLoop);
            }
            gameLoop.lastTs = 0;

            // Initialize AI
            async function initMediaPipe() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
                    video.srcObject = stream;
                    await video.play();
                    webcamReady = true;

                    const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
                    const handLandmarker = await HandLandmarker.createFromOptions(vision, {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
                            delegate: 'GPU'
                        },
                        numHands: 1, runningMode: 'VIDEO',
                        minHandDetectionConfidence: 0.6, minHandPresenceConfidence: 0.6, minTrackingConfidence: 0.5
                    });

                    loadingOverlay.classList.add('hidden');
                    menuOverlay.classList.remove('hidden');

                    function onHandResults(landmarks) {
                        if (controlMode === 'mouse') return; 
                        if (landmarks && landmarks.length > 0) {
                            const lm = landmarks[0];
                            handX = 1 - lm[0].x; handY = lm[0].y; handDetected = true;
                            
                            const tips = [4, 8, 12, 16, 20]; const pips = [3, 6, 10, 14, 18];
                            let curled = 0;
                            for (let i = 0; i < tips.length; i++) if (lm[tips[i]].y > lm[pips[i]].y + 0.04) curled++;
                            isFiringInput = curled >= 4;
                        } else { handDetected = false; isFiringInput = false; }
                    }

                    let lastTimestamp = -1;
                    function detectLoop() {
                        if (handLandmarker && video.readyState >= 2) {
                            const now = performance.now();
                            if (now !== lastTimestamp) {
                                lastTimestamp = now;
                                const result = handLandmarker.detectForVideo(video, now);
                                onHandResults(result.landmarks);
                            }
                        }
                        requestAnimationFrame(detectLoop);
                    }
                    requestAnimationFrame(detectLoop);
                } catch (e) {
                    console.warn('Webcam unavailable, forcing mouse mode', e);
                    switchControl('mouse');
                    loadingOverlay.classList.add('hidden');
                    menuOverlay.classList.remove('hidden');
                    document.getElementById('toggleControlBtnMenu').style.display = 'none'; 
                }
            }

            document.getElementById('startBtn').addEventListener('click', () => {
                initAudio(); 
                resetGame();
                menuOverlay.classList.add('hidden');
            });

            // Start Boot Sequence
            initMediaPipe();
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
